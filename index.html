<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Tolu the Shopper | Premium Personal Shopping &amp; Errand Service in Lagos
    </title>
    <meta
      name="description"
      content="Tolu the Shopper is a Lagos-based personal shopping and errand service. We source, inspect, and deliver quality items across Lagos, Nigeria, and worldwide. We Shop. You Relax."
    />
    <meta name="theme-color" content="#FBF1E6" />

    <!-- Applies the saved/system theme before paint, so there's no flash of the wrong mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("tolu-theme");
          var isDark = stored
            ? stored === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Tolu the Shopper | We Shop. You Relax."
    />
    <meta
      property="og:description"
      content="Premium personal shopping & errand service in Lagos. Groceries, fashion, gifts, electronics.  sourced, inspected, and delivered. Lagos · Nationwide · Worldwide."
    />
    <meta property="og:type" content="website" />

    <!-- Fonts are self-hosted as real .woff2 files, loaded via @font-face in src/index.css -->

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
  </head>
  <body
    class="bg-cream dark:bg-navy text-ink dark:text-cream font-body antialiased selection:bg-blush transition-colors duration-500"
  >
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
